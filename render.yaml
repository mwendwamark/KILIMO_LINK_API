services:
  - type: web
    name: KILIMO_LINK_API
    runtime: ruby
    plan: free
    region: oregon
    buildCommand: "./bin/render-build.sh"
    startCommand: "bin/rails server"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: KILIMO_LINK_API_DB
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 2
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: GCS_CREDENTIALS
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_DOMAIN
        sync: false

databases:
  - name: KILIMO_LINK_API_DB
    plan: free
    region: oregon
    databaseName: kilimo_link_api_production